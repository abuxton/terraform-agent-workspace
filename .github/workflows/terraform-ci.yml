name: Terraform CI

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'Makefile'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Install tflint
        run: |
          curl -sSfL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run CI (fmt/validate/tflint)
        env:
          TF_DIR: .
        run: |
          make ci
